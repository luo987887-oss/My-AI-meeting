<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg: #f5f7fa;
      --bg-grid: rgba(17, 24, 39, 0.045);
      --card: #ffffff;
      --card-strong: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --subtle: #eef2f7;
      --border: rgba(17, 24, 39, 0.08);
      --border-strong: rgba(17, 24, 39, 0.14);
      --shadow: 0 20px 55px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.06);
      --yellow: #ffd000;
      --yellow-strong: #f4bf00;
      --blue: #2f7df6;
      --green: #23b26b;
      --orange: #ff8a3d;
      --red: #ef4444;
      --purple: #7c3aed;
      --radius: 24px;
      --radius-sm: 16px;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      color-scheme: light;
    }

    body.dark {
      --bg: #0d1117;
      --bg-grid: rgba(255, 255, 255, 0.045);
      --card: #151b24;
      --card-strong: #111821;
      --text: #f4f7fb;
      --muted: #a2acba;
      --subtle: #202a36;
      --border: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.15);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      --shadow-soft: 0 12px 34px rgba(0, 0, 0, 0.26);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-grid) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
      transition: background-color 240ms var(--ease), color 240ms var(--ease);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(1560px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      gap: 16px;
      align-items: center;
      min-width: 0;
    }

    .logo-mark {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #111827;
      font-weight: 850;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 42%),
        var(--yellow);
      box-shadow: 0 16px 34px rgba(255, 208, 0, 0.26);
      position: relative;
      overflow: hidden;
    }

    .logo-mark::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 15px;
    }

    .logo-mark span {
      position: relative;
      z-index: 1;
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(47, 125, 246, 0.1);
      color: var(--blue);
      font-size: 12px;
      font-weight: 750;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 44px);
      line-height: 1.08;
      font-weight: 860;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      max-width: 520px;
    }

    .btn,
    .select-wrap {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
      white-space: nowrap;
    }

    .btn:hover,
    .select-wrap:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 208, 0, 0.65);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.1);
    }

    .btn:focus-visible,
    .icon-btn:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(255, 208, 0, 0.42);
      outline-offset: 2px;
    }

    .btn.primary {
      background: var(--yellow);
      color: #111827;
      border-color: rgba(17, 24, 39, 0.08);
      box-shadow: 0 18px 36px rgba(255, 208, 0, 0.26);
      font-weight: 760;
    }

    .btn.ghost {
      box-shadow: none;
      background: var(--subtle);
    }

    .btn.small {
      min-height: 36px;
      padding: 8px 11px;
      font-size: 13px;
    }

    .btn.danger:hover {
      border-color: rgba(239, 68, 68, 0.48);
      color: var(--red);
    }

    .btn[disabled] {
      cursor: progress;
      opacity: 0.72;
      transform: none;
    }

    .select-wrap {
      position: relative;
      padding-right: 10px;
      box-shadow: var(--shadow-soft);
    }

    .select-wrap select {
      border: 0;
      background: transparent;
      color: var(--text);
      outline: 0;
      cursor: pointer;
      min-width: 98px;
    }

    .workflow-strip {
      display: grid;
      grid-template-columns: 1fr 26px 1fr 26px 1fr;
      align-items: stretch;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .workflow-step {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    body.dark .workflow-step {
      background: rgba(21, 27, 36, 0.82);
    }

    .workflow-step::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 3px solid var(--step-color, var(--yellow));
      opacity: 0.82;
    }

    .step-index {
      width: 34px;
      height: 34px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--step-color, var(--yellow));
      color: #111827;
      font-weight: 820;
      flex: 0 0 auto;
    }

    .workflow-step strong {
      display: block;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .workflow-step span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .workflow-arrow {
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .stage-card {
      position: relative;
      min-width: 0;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 18px;
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease), border-color 220ms var(--ease), background 220ms var(--ease);
      overflow: hidden;
    }

    .stage-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-strong);
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.12);
    }

    body.dark .stage-card:hover {
      box-shadow: 0 28px 76px rgba(0, 0, 0, 0.42);
    }

    .stage-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 4px;
      border-radius: 0 0 999px 999px;
      background: var(--stage-color, var(--yellow));
    }

    .stage-card.prepare {
      --stage-color: var(--yellow);
    }

    .stage-card.capture {
      --stage-color: var(--blue);
    }

    .stage-card.follow {
      --stage-color: var(--green);
    }

    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .stage-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 820;
    }

    .stage-kicker {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stage-icon {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #111827;
      background: var(--stage-color, var(--yellow));
      box-shadow: 0 14px 28px rgba(17, 24, 39, 0.09);
    }

    .module {
      padding: 14px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--subtle) 42%, transparent);
      border: 1px solid var(--border);
      margin-top: 12px;
    }

    @supports not (background: color-mix(in srgb, white 50%, black)) {
      .module {
        background: var(--subtle);
      }
    }

    .module-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .module-title h3 {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .module-title h3 i {
      color: var(--stage-color, var(--blue));
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 15px;
      padding: 11px 12px;
      outline: none;
      transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background 180ms var(--ease);
    }

    textarea {
      min-height: 172px;
      resize: vertical;
      line-height: 1.65;
    }

    input:hover,
    textarea:hover,
    select:hover {
      border-color: var(--border-strong);
    }

    .agenda-list,
    .prep-list,
    .risk-list,
    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .agenda-item,
    .prep-item,
    .risk-item,
    .summary-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 11px;
      border-radius: 15px;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 180ms var(--ease), opacity 180ms var(--ease), border-color 180ms var(--ease);
    }

    .agenda-item:hover,
    .prep-item:hover,
    .risk-item:hover,
    .summary-list li:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }

    .agenda-index {
      width: 24px;
      height: 24px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: rgba(255, 208, 0, 0.22);
      color: #6e5700;
      font-size: 12px;
      font-weight: 820;
    }

    body.dark .agenda-index {
      color: #ffe37a;
    }

    .prep-item input[type="checkbox"],
    .action-check {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      margin-top: 3px;
      flex: 0 0 auto;
    }

    .prep-item.done .prep-text,
    .action-item.done .action-task input {
      text-decoration: line-through;
      color: var(--muted);
    }

    .prep-text {
      flex: 1;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      transition: background 160ms var(--ease), color 160ms var(--ease), transform 160ms var(--ease);
      flex: 0 0 auto;
    }

    .icon-btn:hover {
      background: rgba(239, 68, 68, 0.09);
      color: var(--red);
      transform: scale(1.04);
    }

    .inline-add {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 10px;
    }

    .countdown-box {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .count-icon {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(47, 125, 246, 0.1);
      color: var(--blue);
    }

    .count-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .count-value {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 840;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .ai-panel {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(47, 125, 246, 0.09), transparent 42%),
        var(--card);
      border: 1px solid rgba(47, 125, 246, 0.18);
    }

    .ai-panel::after {
      content: "";
      position: absolute;
      top: 0;
      left: -130%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.34), transparent);
      animation: sheen 4.5s infinite;
      pointer-events: none;
    }

    body.dark .ai-panel::after {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    .risk-item {
      align-items: center;
    }

    .risk-item i {
      color: var(--orange);
    }

    .risk-item.safe i {
      color: var(--green);
    }

    .empty-state {
      display: grid;
      place-items: center;
      gap: 9px;
      padding: 22px 12px;
      color: var(--muted);
      text-align: center;
      border-radius: 18px;
      border: 1px dashed var(--border-strong);
      background: var(--card);
    }

    .empty-art {
      width: 70px;
      height: 48px;
      position: relative;
      margin-bottom: 2px;
    }

    .empty-art::before,
    .empty-art::after {
      content: "";
      position: absolute;
      border-radius: 15px;
      border: 1px solid var(--border-strong);
      background: var(--subtle);
    }

    .empty-art::before {
      width: 48px;
      height: 34px;
      left: 4px;
      top: 8px;
      box-shadow: 12px -8px 0 rgba(255, 208, 0, 0.38);
    }

    .empty-art::after {
      width: 18px;
      height: 18px;
      right: 5px;
      bottom: 4px;
      background: rgba(47, 125, 246, 0.14);
    }

    .empty-title {
      color: var(--text);
      font-weight: 780;
      font-size: 14px;
    }

    .empty-desc {
      max-width: 260px;
      font-size: 12px;
      line-height: 1.5;
    }

    .ai-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 12px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid rgba(47, 125, 246, 0.18);
      color: var(--muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid rgba(47, 125, 246, 0.18);
      border-top-color: var(--blue);
      animation: spin 800ms linear infinite;
      flex: 0 0 auto;
    }

    .loading-dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }

    .translation-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .translation-output {
      margin-top: 11px;
      padding: 13px;
      min-height: 98px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid rgba(47, 125, 246, 0.18);
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .translation-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 760;
    }

    .ai-result-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid rgba(47, 125, 246, 0.18);
    }

    .summary-block h4 {
      margin: 0 0 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-block p {
      margin: 0;
      color: var(--muted);
      line-height: 1.62;
      font-size: 13px;
    }

    .summary-list li {
      font-size: 13px;
      line-height: 1.45;
    }

    .extract-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .action-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .action-item {
      display: grid;
      grid-template-columns: 24px 22px minmax(150px, 1.5fr) minmax(86px, 0.78fr) minmax(98px, 0.92fr) minmax(112px, 0.9fr) 34px;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 180ms var(--ease), box-shadow 180ms var(--ease), border-color 180ms var(--ease), opacity 180ms var(--ease);
    }

    .action-item:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
    }

    .action-item.dragging {
      opacity: 0.55;
      transform: scale(0.99);
    }

    .action-item.drag-over {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255, 208, 0, 0.18);
    }

    .drag-handle {
      color: var(--muted);
      cursor: grab;
      text-align: center;
    }

    .action-item input,
    .action-item select {
      min-height: 36px;
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .status-select {
      font-weight: 740;
    }

    .status-todo .status-select {
      color: var(--muted);
    }

    .status-progress .status-select {
      color: var(--orange);
    }

    .status-done .status-select {
      color: var(--green);
    }

    .action-add-grid {
      display: grid;
      grid-template-columns: 1.5fr 0.75fr 0.9fr auto;
      gap: 8px;
      margin-top: 10px;
    }

    .health-card {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .score-ring {
      width: 104px;
      height: 104px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--card) 0 58%, transparent 59%),
        conic-gradient(var(--green) var(--score), rgba(107, 114, 128, 0.18) 0);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .score-ring strong {
      font-size: 24px;
      line-height: 1;
    }

    .score-ring span {
      color: var(--muted);
      font-size: 12px;
    }

    .health-copy {
      min-width: 0;
    }

    .health-copy p {
      margin: 0 0 9px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .health-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--subtle);
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .tag.good {
      color: var(--green);
      background: rgba(35, 178, 107, 0.1);
    }

    .tag.warn {
      color: var(--orange);
      background: rgba(255, 138, 61, 0.12);
    }

    .export-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .toast-root {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 40;
      pointer-events: none;
    }

    .toast {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--text);
      color: var(--card);
      box-shadow: var(--shadow);
      animation: toastIn 220ms var(--ease);
      pointer-events: auto;
      line-height: 1.4;
    }

    body.dark .toast {
      background: #f4f7fb;
      color: #0d1117;
    }

    .removing {
      opacity: 0;
      transform: translateX(18px) scale(0.98) !important;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes dots {
      0% {
        content: "";
      }
      25% {
        content: ".";
      }
      50% {
        content: "..";
      }
      75%,
      100% {
        content: "...";
      }
    }

    @keyframes sheen {
      0% {
        left: -130%;
      }
      48%,
      100% {
        left: 130%;
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1180px) {
      .stage-grid {
        grid-template-columns: 1fr;
      }

      .stage-card {
        max-width: none;
      }
    }

    @media (max-width: 820px) {
      .app-shell {
        width: min(100% - 24px, 720px);
        padding-top: 18px;
      }

      .topbar {
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .workflow-strip {
        grid-template-columns: 1fr;
      }

      .workflow-arrow {
        display: none;
      }

      .field-grid,
      .translation-toolbar,
      .health-card,
      .export-actions,
      .action-add-grid {
        grid-template-columns: 1fr;
      }

      .action-item {
        grid-template-columns: 22px 22px 1fr 34px;
      }

      .action-owner,
      .action-deadline,
      .action-status {
        grid-column: 3 / 5;
      }

      .action-task {
        grid-column: 3 / 4;
      }
    }

    @media (max-width: 520px) {
      .brand {
        align-items: flex-start;
      }

      .logo-mark {
        width: 48px;
        height: 48px;
        border-radius: 17px;
      }

      .btn,
      .select-wrap {
        width: 100%;
        justify-content: center;
      }

      .top-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .inline-add {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>

    function normalizeState(data) {
      const defaults = createDefaultData();
      const normalized = {
        ...defaults,
        ...data,
        meeting: { ...defaults.meeting, ...(data.meeting || {}) },
        prepItems: Array.isArray(data.prepItems) ? data.prepItems : defaults.prepItems,
        agenda: Array.isArray(data.agenda) ? data.agenda : defaults.agenda,
        actionItems: Array.isArray(data.actionItems) ? data.actionItems : defaults.actionItems
      };
      if (!["zh", "en"].includes(normalized.lang)) normalized.lang = "zh";
      if (!["zh", "en"].includes(normalized.translationTarget)) normalized.translationTarget = "en";
      normalized.prepItems = normalized.prepItems.map(item => ({ id: item.id || makeId(), text: item.text || "", done: Boolean(item.done) }));
      normalized.actionItems = normalized.actionItems.map(item => ({
        id: item.id || makeId(),
        task: item.task || "",
        owner: item.owner || "",
        deadline: item.deadline || "",
        status: ["todo", "inProgress", "done"].includes(item.status) ? item.status : "todo"
      }));
      return normalized;
    }

    function saveState(showSaved = false) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (showSaved) {
        window.clearTimeout(ui.saveToastTimer);

      const value = dict[key] ?? i18n.en[key] ?? i18n.zh[key] ?? key;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function analyzeRisks() {
      const risks = [];
      if (!state.meeting.link.trim()) risks.push(t("riskNoLink"));
      if (!state.agenda.length) risks.push(t("riskNoAgenda"));
      const unfinished = state.prepItems.filter(item => !item.done).length;
      if (unfinished > 0) risks.push(t("riskUnfinished", unfinished));
      return risks;
    }

    function calculateHealth() {
      const actions = state.actionItems;
      const risks = analyzeRisks();
      const ownerCount = actions.filter(item => item.owner.trim()).length;
      const deadlineCount = actions.filter(item => item.deadline.trim()).length;
      let score = 0;
      score += state.agenda.length ? 2.2 : 0;
      score += actions.length ? 2 : 0;
      score += actions.length ? (ownerCount / actions.length) * 2 : 0;
      score += actions.length ? (deadlineCount / actions.length) * 2 : 0;
      score += Math.max(0, 1.8 - risks.length * 0.55);
      score += state.notes.trim() ? 0.5 : 0;
      score = Math.max(0, Math.min(10, score));

      let advice = t("healthHealthy");
      if (!state.agenda.length) advice = t("healthNeedAgenda");
      else if (!actions.length) advice = t("healthNeedActions");
      else if (ownerCount < actions.length) advice = t("healthNeedOwners", actions.length - ownerCount);
      else if (deadlineCount < actions.length) advice = t("healthNeedDeadlines", actions.length - deadlineCount);
      else if (risks.length) advice = t("healthRiskCount", risks.length);

      return {
        score: score.toFixed(1),
        percent: Math.round(score * 10),
        advice
      };
    }

    function startCountdown() {
      window.clearInterval(countdownTimer);
      countdownTimer = window.setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      const el = document.getElementById("countdownValue");
      if (!el) return;
      const target = new Date(state.meeting.time);
      if (!state.meeting.time || Number.isNaN(target.getTime())) {
        el.textContent = t("meetingStarted");
        return;
      }
      const diff = target.getTime() - Date.now();
      if (diff <= 0) {
        el.textContent = t("meetingStarted");
        return;
      }
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      el.textContent = t("countdownValue", days, hours, minutes, seconds);
    }

    function scheduleTranslation(immediate = false) {
      window.clearTimeout(translationTimer);
      const text = state.notes.trim();
      if (!text) {
        ui.translating = false;
        state.translationText = "";
        renderTranslation();
        saveState();
        return;
      }
      ui.translating = true;
      renderTranslation();
      translationTimer = window.setTimeout(() => {
        state.translationText = translateNotes(state.notes, state.translationTarget);
        ui.translating = false;
        renderTranslation();
        saveState();
      }, immediate ? 180 : 720);
    }

    function renderTranslation() {

        return;
      }
      if (!state.translationText.trim()) {
        node.innerHTML = renderEmptyState(t("translationEmptyTitle"), t("translationEmptyDesc"));
        return;
      }
      node.innerHTML = `<div class="translation-meta">${icon("fa-earth-asia")} ${escapeHtml(t("translationMeta"))}</div>${escapeHtml(state.translationText)}`;

    function translateNotes(text, target) {
      const lines = text.split(/\n+/).map(line => line.trim()).filter(Boolean);
      const translated = lines.map(line => translateLine(line, target));
      return translated.join("\n");
    }

    function translateLine(line, target) {
      const prefixMatch = line.match(/^(\d+[\.\)、]\s*)/);
      const prefix = prefixMatch ? prefixMatch[1] : "";
      const clean = line.replace(/^(\d+[\.\)、]\s*)/, "").trim();

      if (target === "en") {
        const direct = {
          "确定Q2核心增长指标": "Confirm Q2 core growth metrics.",
          "下周启动用户访谈": "User interviews will begin next week.",
          "设计团队输出高保真原型": "The design team will deliver high-fidelity prototypes.",
          "核心目标同步": "Align on core objectives.",
          "当前进展回顾": "Review current progress.",
          "用户反馈分析": "Analyze user feedback.",
          "风险讨论": "Discuss risks.",
          "下阶段资源规划": "Plan resources for the next phase."
        };
        if (direct[clean]) return `${prefix}${direct[clean]}`;
        const action = parseChineseAction(clean);
        if (action) return `${prefix}${action.owner} will ${verbToEnglish(action.verb)} ${stripChineseVerb(action.task)} by ${action.deadline || "the agreed date"}.`;
        return `${prefix}${clean}`;
      }

      const direct = {
        "Confirm Q2 core growth metrics.": "确定Q2核心增长指标",
        "User interviews will begin next week.": "下周启动用户访谈",
        "The design team will deliver high-fidelity prototypes.": "设计团队输出高保真原型",
        "Align on core objectives.": "核心目标同步",
        "Review current progress.": "当前进展回顾",
        "Analyze user feedback.": "用户反馈分析",
        "Discuss risks.": "风险讨论",
        "Plan resources for the next phase.": "下阶段资源规划"
      };
      const withoutPeriod = clean.endsWith(".") ? clean : `${clean}.`;
      if (direct[clean] || direct[withoutPeriod]) return `${prefix}${direct[clean] || direct[withoutPeriod]}`;
      return `${prefix}${clean}`;
    }

    function verbToEnglish(verb) {
      const map = {
        "完成": "complete",
        "输出": "deliver",
        "提交": "submit",
        "推进": "move forward",
        "确认": "confirm",
        "启动": "start"
      };
      return map[verb] || "follow up on";
    }

    function stripChineseVerb(task) {
      return task.replace(/^(完成|输出|提交|推进|确认|启动)/, "");
    }

    function generateAgendaByTopic(topic) {
      const isEnglish = state.lang === "en";
      const lower = topic.toLowerCase();
      const roadmap = /q2|路线图|roadmap|产品|product/.test(lower);
      if (roadmap) {
        return isEnglish
          ? [
              "Align on Q2 core objectives",
              "Review current product progress",
              "Analyze user feedback and opportunity areas",
              "Discuss delivery risks and dependencies",
              "Plan next-phase resources and owners"
            ]
          : [
              "核心目标同步",
              "当前进展回顾",
              "用户反馈分析",
              "风险讨论",
              "下阶段资源规划"
            ];
      }
      return isEnglish
        ? ["Clarify meeting goals", "Review current context", "Discuss key blockers", "Define owners and deadlines", "Confirm follow-up rhythm"]
        : ["明确会议目标", "回顾当前上下文", "讨论关键阻塞", "定义 owner 与 deadline", "确认会后推进节奏"];
    }

    function generateSummary() {
      const isEnglish = state.lang === "en";
      if (isEnglish) {
        return {
          overview: "The meeting clarified Q2 growth priorities, moved user research into the next execution cycle, and aligned design output as a key dependency.",
          decisions: [
            "Q2 growth metrics will focus on activation, retention, and conversion quality.",
            "User interviews will start next week to validate roadmap priorities.",
            "The design team will provide high-fidelity prototypes for the next review."
          ],
          risks: [
            "The meeting link and agenda should be completed before the live meeting.",
            "Research findings may affect roadmap scope and resource allocation."
          ],
          nextSteps: [
            "Confirm owners for interview recruitment and prototype review.",
            "Update action item status before the next weekly sync."
          ]
        };
      }
      return {
        overview: "本次会议明确了 Q2 产品路线图评审的核心目标，并将用户访谈、高保真原型和增长指标对齐为下一阶段推进重点。",
        decisions: [
          "Q2 核心增长指标聚焦激活、留存与转化质量。",
          "下周启动用户访谈，用于验证路线图优先级。",
          "设计团队输出高保真原型，进入下一轮评审。"
        ],
        risks: [
          "会议链接与议程仍需补充，避免会前准备不充分。",
          "用户访谈结果可能影响路线图范围和资源分配。"
        ],
        nextSteps: [
          "确认用户访谈招募与原型评审 owner。",
          "在下次周会前更新行动项状态。"
        ]
      };
    }

    function extractActionItemsFromNotes(text) {
      const lines = text.split(/\n+/).map(line => line.replace(/^(\d+[\.\)、]\s*)/, "").trim()).filter(Boolean);
      const extracted = [];
      lines.forEach(line => {
        const parsed = parseChineseAction(line) || parseEnglishAction(line) || parseKnownLine(line);
        if (parsed) extracted.push(parsed);
      });

      const fallback = state.lang === "en"
        ? [
            { task: "Confirm Q2 core growth metrics", owner: "Product Lead", deadline: "This Friday" },
            { task: "Start user interviews", owner: "Product Ops", deadline: "Next week" },
            { task: "Deliver high-fidelity prototypes", owner: "Design Team", deadline: "Next Friday" }
          ]
        : [
            { task: "确认Q2核心增长指标", owner: "产品负责人", deadline: "本周五" },
            { task: "启动用户访谈", owner: "产品运营", deadline: "下周" },
            { task: "输出高保真原型", owner: "设计团队", deadline: "下周五" }
          ];

      const source = extracted.length ? extracted : fallback;
      return source.map((item, index) => ({
        id: makeId(),
        task: item.task,
        owner: item.owner,
        deadline: item.deadline,
        status: index === 0 ? "inProgress" : "todo"
      }));
    }

    function parseKnownLine(line) {
      const isEnglish = state.lang === "en";
      if (/增长指标|growth metric/i.test(line)) {
        return {
          task: isEnglish ? "Confirm Q2 core growth metrics" : "确认Q2核心增长指标",
          owner: isEnglish ? "Product Lead" : "产品负责人",
          deadline: isEnglish ? "This Friday" : "本周五"
        };
      }
      if (/用户访谈|user interview/i.test(line)) {
        return {
          task: isEnglish ? "Start user interviews" : "启动用户访谈",
          owner: isEnglish ? "Product Ops" : "产品运营",
          deadline: isEnglish ? "Next week" : "下周"
        };
      }
      if (/原型|prototype|design/i.test(line)) {
        return {
          task: isEnglish ? "Deliver high-fidelity prototypes" : "输出高保真原型",
          owner: isEnglish ? "Design Team" : "设计团队",
          deadline: isEnglish ? "Next Friday" : "下周五"
        };
      }
      return null;
    }

    function parseChineseAction(line) {
      const match = line.match(/^([\u4e00-\u9fa5A-Za-z]{2,12}?)(今天|明天|本周[一二三四五六日天]?|下周[一二三四五六日天]?|\d{1,2}月\d{1,2}日)?(?:前|之前)?(完成|输出|提交|推进|确认|启动)(.+)$/);
      if (!match) return null;
      const owner = match[1];
      const deadline = match[2] || "";
      const verb = match[3];
      const detail = match[4].trim();
      return {
        task: `${verb}${detail}`,
        owner,
        deadline,
        verb
      };
    }

    function parseEnglishAction(line) {
      const match = line.match(/^([A-Z][A-Za-z\s]{1,32})\s+(?:will\s+)?(complete|deliver|start|confirm|submit|follow up on|move forward)\s+(.+?)(?:\s+by\s+(.+))?\.?$/i);
      if (!match) return null;
      const verb = match[2].toLowerCase();
      return {
        task: `${verb.charAt(0).toUpperCase()}${verb.slice(1)} ${match[3]}`.replace(/\.$/, ""),
        owner: match[1].trim(),
        deadline: (match[4] || "").replace(/\.$/, "")
      };
    }

    function updateAgendaModule() {
      const node = document.getElementById("agendaModule");
      if (node) node.innerHTML = renderAgendaHTML();
      updateRiskModule();
      updateHealthModule();
    }

    function updatePrepModule() {
      const node = document.getElementById("prepModule");
      if (node) node.innerHTML = renderPrepHTML();
      updateRiskModule();
      updateHealthModule();
    }

    function updateRiskModule() {
      const node = document.getElementById("riskModule");
      if (node) node.innerHTML = renderRiskHTML();
    }

    function updateSummaryModule() {
      const node = document.getElementById("summaryModule");
      if (node) node.innerHTML = renderSummaryHTML();
    }

    function updateExtractModule() {
      const node = document.getElementById("extractModule");
      if (node) node.innerHTML = renderExtractHTML();
    }

    function updateActionsModule() {
      const node = document.getElementById("actionsModule");
      if (node) node.innerHTML = renderActionsHTML();
      updateHealthModule();
      updateExtractModule();
    }

    function updateHealthModule() {
      const node = document.getElementById("healthModule");
      if (node) node.innerHTML = renderHealthHTML();
    }

    function showToast(message) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `${icon("fa-circle-check")} <span>${escapeHtml(message)}</span>`;
      toastRoot.appendChild(toast);
      window.setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(8px)";
      }, 2200);
      window.setTimeout(() => toast.remove(), 2600);
    }

    function getActionItem(id) {
      return state.actionItems.find(item => item.id === id);
    }

    function removeWithAnimation(selector, callback) {
      const el = document.querySelector(selector);
      if (el) {
        el.classList.add("removing");
        window.setTimeout(callback, 190);
      } else {
        callback();
      }
    }

    function buildExport(format = "md") {
      const title = state.meeting.topic || t("untitledMeeting");
      const summaryText = state.summary?.overview || t("exportSummaryFallback");
      const time = state.meeting.time ? new Date(state.meeting.time).toLocaleString(state.lang === "zh" ? "zh-CN" : "en-US") : "";

      if (format === "txt") {
        const lines = [
          title,
          "",
          `${t("exportMeetingTime")}: ${time}`,
          `${t("exportDuration")}: ${state.meeting.duration} ${t("exportMinutes")}`,
          "",
          t("summaryOverview"),
          summaryText,
          "",
          t("actionTracking"),
          ...state.actionItems.map((item, index) => `${index + 1}. ${item.task} | ${t("owner")}: ${item.owner || "-"} | ${t("deadline")}: ${item.deadline || "-"} | ${t("status")}: ${statusLabel(item.status)}`)
        ];
        return lines.join("\n");
      }

      const actionRows = state.actionItems.length
        ? state.actionItems.map(item => `| ${item.task || "-"} | ${item.owner || "-"} | ${item.deadline || "-"} | ${statusLabel(item.status)} |`).join("\n")
        : `| - | - | - | - |`;

      return [
        `# ${title}`,
        "",
        `- ${t("exportMeetingTime")}: ${time}`,
        `- ${t("exportDuration")}: ${state.meeting.duration} ${t("exportMinutes")}`,
        "",
        `## ${t("summaryOverview")}`,
        summaryText,
        "",
        `## ${t("actionTracking")}`,
        `| ${t("task")} | ${t("owner")} | ${t("deadline")} | ${t("status")} |`,
        "| --- | --- | --- | --- |",
        actionRows
      ].join("\n");
    }

    function downloadFile(filename, text, mime) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    function sanitizeFilename(name) {
      return (name || t("untitledMeeting")).replace(/[\\/:*?"<>|]/g, "-").slice(0, 60);
    }

    app.addEventListener("click", async event => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;

      if (action === "toggle-theme") {
        state.dark = !state.dark;
        saveState();
        renderApp();
        return;
      }

      if (action === "reset-data") {
        const lang = state.lang;
        const dark = state.dark;
        state = createDefaultData();
        state.lang = lang;
        state.dark = dark;
        saveState();
        renderApp();
        showToast(t("toastReset"));
        return;
      }

      if (action === "generate-agenda") {
        ui.agendaLoading = true;
        updateAgendaModule();
        window.setTimeout(() => {
          state.agenda = generateAgendaByTopic(state.meeting.topic);
          ui.agendaLoading = false;
          saveState();
          updateAgendaModule();
          showToast(t("toastAgenda"));
        }, 980);
        return;
      }

      if (action === "add-prep") {
        const input = document.getElementById("newPrepInput");
        const value = input?.value.trim();
        if (!value) {
          showToast(t("toastNeedPrep"));
          return;
        }
        state.prepItems.push({ id: makeId(), text: value, done: false });
        saveState(true);
        updatePrepModule();
        return;
      }

      if (action === "delete-prep") {
        const id = target.dataset.id;
        removeWithAnimation(`[data-prep-id="${CSS.escape(id)}"]`, () => {
          state.prepItems = state.prepItems.filter(item => item.id !== id);
          saveState(true);
          updatePrepModule();
        });
        return;
      }

      if (action === "generate-summary") {
        ui.summaryLoading = true;
        updateSummaryModule();
        window.setTimeout(() => {
          state.summary = generateSummary();
          ui.summaryLoading = false;
          saveState();
          updateSummaryModule();
          showToast(t("toastSummary"));
        }, 1050);
        return;
      }

      if (action === "extract-actions") {
        ui.actionsLoading = true;
        updateExtractModule();
        window.setTimeout(() => {
          state.actionItems = extractActionItemsFromNotes(state.notes);
          ui.actionsLoading = false;
          saveState();
          updateActionsModule();
          showToast(t("toastActions"));
        }, 980);
        return;
      }

      if (action === "add-action") {
        const taskInput = document.getElementById("newActionTask");
        const ownerInput = document.getElementById("newActionOwner");
        const deadlineInput = document.getElementById("newActionDeadline");
        const task = taskInput?.value.trim();
        if (!task) {
          showToast(t("toastNeedAction"));
          return;
        }
        state.actionItems.push({
          id: makeId(),
          task,
          owner: ownerInput?.value.trim() || "",
          deadline: deadlineInput?.value.trim() || "",
          status: "todo"
        });
        saveState(true);
        updateActionsModule();
        return;
      }

      if (action === "delete-action") {
        const id = target.dataset.id;
        removeWithAnimation(`[data-action-id="${CSS.escape(id)}"]`, () => {
          state.actionItems = state.actionItems.filter(item => item.id !== id);
          saveState(true);
          updateActionsModule();
        });
        return;
      }

      if (action === "export-md") {
        downloadFile(`${sanitizeFilename(state.meeting.topic)}.md`, buildExport("md"), "text/markdown;charset=utf-8");
        showToast(t("toastExported"));
        return;
      }

      if (action === "export-txt") {
        downloadFile(`${sanitizeFilename(state.meeting.topic)}.txt`, buildExport("txt"), "text/plain;charset=utf-8");
        showToast(t("toastExported"));
        return;
      }

      if (action === "copy-results") {
        await copyText(buildExport("md"));
        showToast(t("toastCopied"));
      }
    });

    app.addEventListener("input", event => {
      const target = event.target;
      if (target.matches("[data-meeting-field]")) {
        const field = target.dataset.meetingField;
        state.meeting[field] = field === "duration" ? Number(target.value || 0) : target.value;
        saveState();
        if (field === "time") updateCountdown();
        if (field === "link") {
          updateRiskModule();
          updateHealthModule();
        }
        return;
      }

      if (target.matches("[data-notes-input]")) {
        state.notes = target.value;
        saveState();
        scheduleTranslation();
        return;
      }

      if (target.matches("[data-action-field]")) {
        const item = getActionItem(target.dataset.id);
        if (!item) return;
        item[target.dataset.actionField] = target.value;
        saveState();
        updateHealthModule();
      }
    });

    app.addEventListener("change", event => {
      const target = event.target;

      if (target.matches('[data-action="switch-language"]')) {
        state.lang = target.value;
        saveState();
        renderApp();
        return;
      }

      if (target.matches('[data-action="translation-target"]')) {
        state.translationTarget = target.value;
        saveState();
        scheduleTranslation();
        return;
      }

      if (target.matches("[data-prep-check]")) {
        const item = state.prepItems.find(prep => prep.id === target.dataset.prepCheck);
        if (!item) return;
        item.done = target.checked;
        saveState(true);
        updatePrepModule();
        return;
      }

      if (target.matches("[data-action-check]")) {
        const item = getActionItem(target.dataset.actionCheck);
        if (!item) return;
        item.status = target.checked ? "done" : "todo";
        saveState(true);
        updateActionsModule();
        return;
      }

      if (target.matches("[data-action-status]")) {
        const item = getActionItem(target.dataset.actionStatus);
        if (!item) return;
        item.status = target.value;
        saveState(true);
        updateActionsModule();
      }
    });

    app.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      if (event.target.id === "newPrepInput") {
        event.preventDefault();
        document.querySelector('[data-action="add-prep"]')?.click();
      }
      if (event.target.id === "newActionTask" || event.target.id === "newActionOwner" || event.target.id === "newActionDeadline") {
        event.preventDefault();
        document.querySelector('[data-action="add-action"]')?.click();
      }
    });

    app.addEventListener("dragstart", event => {
      const item = event.target.closest("[data-action-id]");
      if (!item) return;
      ui.draggedActionId = item.dataset.actionId;
      item.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", ui.draggedActionId);
    });

    app.addEventListener("dragover", event => {
      const item = event.target.closest("[data-action-id]");
      if (!item || !ui.draggedActionId || item.dataset.actionId === ui.draggedActionId) return;
      event.preventDefault();
      document.querySelectorAll(".action-item.drag-over").forEach(el => el.classList.remove("drag-over"));
      item.classList.add("drag-over");
    });

    app.addEventListener("dragleave", event => {
      const item = event.target.closest("[data-action-id]");
      if (item) item.classList.remove("drag-over");
    });

    app.addEventListener("drop", event => {
      const item = event.target.closest("[data-action-id]");
      if (!item || !ui.draggedActionId) return;
      event.preventDefault();
      const from = state.actionItems.findIndex(action => action.id === ui.draggedActionId);
      const to = state.actionItems.findIndex(action => action.id === item.dataset.actionId);
      if (from === -1 || to === -1 || from === to) return;
      const [moved] = state.actionItems.splice(from, 1);
      state.actionItems.splice(to, 0, moved);
      saveState(true);
      updateActionsModule();
    });

    app.addEventListener("dragend", () => {
      ui.draggedActionId = null;
      document.querySelectorAll(".action-item.dragging, .action-item.drag-over").forEach(el => {
        el.classList.remove("dragging", "drag-over");
      });
    });

    renderApp();
  </script>
</body>
</html>
